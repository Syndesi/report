name: Release package
on:
  push:
    tags:
      - '*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} | tr '[:upper:]' '[:lower:]'

jobs:

  build-docker-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    name: 'Build Docker Image'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - name: Expose GitHub Runtime
        uses: crazy-max/ghaction-github-runtime@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          version: latest
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Docker image
        run: |
          docker buildx build \
            --target prod \
            --load \
            -t report:prod \
            -f ./tools/Dockerfile \
            .
      - name: Save Docker image
        run: |
          docker save report:prod | gzip > report-prod.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: docker-image-report-prod
          path: report-prod.tar.gz
          retention-days: 7
      - name: Push Docker image
        run: |
          DOCKER_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
          docker tag report:prod "$DOCKER_TAG"
          docker push "$DOCKER_TAG"
