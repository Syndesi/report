version: '3'

tasks:

  dev:build:
    cmds:
      - docker compose -f ./tools/docker-compose.yml build --no-cache

  dev:up:
    cmds:
      - docker compose -f ./tools/docker-compose.yml up -d --remove-orphans

  dev:down:
    cmds:
      - docker compose -f ./tools/docker-compose.yml down

  dev:cli:
    cmds:
      - docker compose -f ./tools/docker-compose.yml exec app /bin/bash

  dev:install:
    cmds:
      - docker compose -f ./tools/docker-compose.yml exec app uv sync

  dev:marimo:
    cmds:
      - docker compose -f ./tools/docker-compose.yml exec app uv run -m marimo edit --no-token --host 0.0.0.0 notebooks

  dev:marimo-run:
    cmds:
      - docker compose -f ./tools/docker-compose.yml exec app uv run -m marimo run --no-token --host 0.0.0.0 notebooks

  dev:test:
    cmds:
      - docker compose -f ./tools/docker-compose.yml exec app uv run -m coverage run -m pytest --no-header
      - docker compose -f ./tools/docker-compose.yml exec app uv run -m coverage html

  dev:cs:
    cmds:
      - docker compose -f ./tools/docker-compose.yml exec app uv run -m ruff check --fix
      - docker compose -f ./tools/docker-compose.yml exec app uv run -m ruff format

  release:
    internal: true
    cmds:
      - |
        OLD_VERSION="$(cat pyproject.toml | dasel -i toml "project.version" -o json | jq -r)"
        echo "old version: $OLD_VERSION"
        NEW_VERSION="$(docker run usvc/semver:latest bump {{.TYPE}} $OLD_VERSION | tr -d '\r')"
        echo "new version: $NEW_VERSION ({{.TYPE}})"
        sed -i "s/version = \"$OLD_VERSION\"/version = \"$NEW_VERSION\"/" pyproject.toml
        git tag "$NEW_VERSION"
        git push origin
        git push --tags

  release:patch:
    deps:
      - task: release
        vars:
          TYPE: "patch"

  release:minor:
    deps:
      - task: release
        vars:
          TYPE: "minor"

  release:major:
    deps:
      - task: release
        vars:
          TYPE: "major"
